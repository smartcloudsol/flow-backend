components:
  parameters:
    AccountId:
      name: accountId
      in: query
      required: true
      schema:
        type: string
      description: WP Suite account ID

    SiteId:
      name: siteId
      in: query
      required: true
      schema:
        type: string
      description: WordPress site ID

    Status:
      name: status
      in: query
      schema:
        type: string
      description: Filter by submission status

    Email:
      name: email
      in: query
      schema:
        type: string
        format: email
      description: Filter by email address

    Search:
      name: search
      in: query
      schema:
        type: string
      description: Full-text search across submission fields

    From:
      name: from
      in: query
      schema:
        type: string
        format: date-time
      description: Filter submissions created after this timestamp

    To:
      name: to
      in: query
      schema:
        type: string
        format: date-time
      description: Filter submissions created before this timestamp

    SortBy:
      name: sortBy
      in: query
      schema:
        type: string
        default: createdAt
      description: Field to sort by

    SortDir:
      name: sortDir
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
      description: Sort direction

    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Maximum number of items to return

    Cursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Pagination cursor from previous response

  schemas:
    FormDefinition:
      type: object
      required:
        - formId
        - accountId
        - siteId
        - name
      properties:
        formId:
          type: string
        accountId:
          type: string
        siteId:
          type: string
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
          default: true
        locale:
          type: string
          example: en_US
        siteName:
          type: string
        autoReplyTemplateKey:
          type: string
          description: Template key for auto-reply emails
        actions:
          type: array
          items:
            type: object
            properties:
              actionKey:
                type: string
              label:
                type: string
              allowedFromStatuses:
                type: array
                items:
                  type: string
              targetStatus:
                type: string
              templateKey:
                type: string
              eventName:
                type: string
              wpHookName:
                type: string
              enabled:
                type: boolean
        fieldSchema:
          type: object
          additionalProperties: true
        settings:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Submission:
      type: object
      properties:
        submissionId:
          type: string
        accountId:
          type: string
        siteId:
          type: string
        formId:
          type: string
        status:
          type: string
          example: new
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        fields:
          type: object
          additionalProperties: true
        email:
          type: string
          format: email
        emailSource:
          type: string
          enum: [field, manual, none]
        tags:
          type: array
          items:
            type: string
        primaryLabel:
          type: string
        summary:
          type: string
        source:
          type: object
          properties:
            ipHash:
              type: string
            uaHash:
              type: string
          additionalProperties: true
        actor:
          type: object
          properties:
            type:
              type: string
              enum: [anonymous, user, system]
        payloadRef:
          type: object
          properties:
            bucket:
              type: string
            key:
              type: string
            contentType:
              type: string
            size:
              type: integer
        notes:
          type: string

    SubmissionEvent:
      type: object
      properties:
        eventId:
          type: string
        submissionId:
          type: string
        eventType:
          type: string
        occurredAt:
          type: string
          format: date-time
        actor:
          type: object
        detail:
          type: object
          additionalProperties: true

    EmailTemplate:
      type: object
      required:
        - templateKey
        - accountId
        - siteId
        - name
      properties:
        templateKey:
          type: string
        accountId:
          type: string
        siteId:
          type: string
        name:
          type: string
        description:
          type: string
        locale:
          type: string
        subject:
          type: string
        htmlBody:
          type: string
        textBody:
          type: string
        fromEmail:
          type: string
          format: email
        fromName:
          type: string
        replyToEmail:
          type: string
          format: email
        templateEngine:
          type: string
          enum: [handlebars, mustache, liquid]
          default: handlebars
        enabled:
          type: boolean
          default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Workflow:
      type: object
      required:
        - workflowId
        - accountId
        - siteId
        - name
      properties:
        workflowId:
          type: string
        accountId:
          type: string
        siteId:
          type: string
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
          default: true
        trigger:
          type: object
          properties:
            eventType:
              type: string
              example: submission.created
            conditions:
              type: array
              items:
                type: object
        steps:
          type: array
          items:
            type: object
            properties:
              stepId:
                type: string
              type:
                type: string
                enum: [email, webhook, status-change, delay, condition]
              config:
                type: object
                additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WebhookEndpoint:
      type: object
      required:
        - webhookKey
        - accountId
        - siteId
        - url
      properties:
        webhookKey:
          type: string
        accountId:
          type: string
        siteId:
          type: string
        url:
          type: string
          format: uri
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
          default: true
        events:
          type: array
          items:
            type: string
          description: EventBridge event types to forward
        signingSecret:
          type: string
          description: HMAC signature secret
        headers:
          type: object
          additionalProperties:
            type: string
        retryPolicy:
          type: object
          properties:
            maxAttempts:
              type: integer
              default: 3
            backoffMultiplier:
              type: number
              default: 2
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        message:
          type: string
        errors:
          type: array
          items:
            type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  securitySchemes:
    CognitoAuthorizer:
      type: apiKey
      name: Authorization
      in: header
      description: Cognito JWT token
      x-amazon-apigateway-authtype: cognito_user_pools

    IamAuthorizer:
      type: apiKey
      name: Authorization
      in: header
      description: AWS Signature Version 4
      x-amazon-apigateway-authtype: awsSigv4
