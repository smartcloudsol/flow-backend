AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: WP Suite Flow backend with forms API, templates, workflows, email, webhook, WAF and reCAPTCHA support

Rules:
  CustomDomainRequiresCertificate:
    Assertions:
      - Assert: !Or
          - !Equals [!Ref ApiCustomDomainName, ""]
          - !Not [!Equals [!Ref AcmCertificateArn, ""]]
        AssertDescription: AcmCertificateArn is required when ApiCustomDomainName is specified.

Metadata:
  AWS::ServerlessRepo::Application:
    Name: WP Suite Flow Backend
    Description: Event-driven forms, submissions, email templates, and workflow automation backend for WordPress sites using WP Suite Flow
    Author: Smart Cloud Solutions
    SpdxLicenseId: MIT
    LicenseUrl: !Sub s3://${ArtifactBucketName}/${ArtifactKeyPrefix}/${DeploymentVersion}/docs/LICENSE
    ReadmeUrl: !Sub s3://${ArtifactBucketName}/${ArtifactKeyPrefix}/${DeploymentVersion}/docs/SAR-README.md
    Labels:
      [
        wordpress,
        forms,
        workflow-automation,
        eventbridge,
        email,
        webhooks,
        dynamodb,
        serverless,
      ]
    HomePageUrl: https://wpsuite.io/flow/
    SemanticVersion: !Ref DeploymentVersion

Parameters:
  DeploymentVersion:
    Type: String
    Default: 1.0.0
    Description: Application version used to locate Lambda, docs, and template artifacts in S3.
  ArtifactBucketName:
    Type: String
    Default: wpsuite-artifacts
    Description: S3 bucket that stores the published deployment artifacts for this application.
  ArtifactKeyPrefix:
    Type: String
    Default: wpsuite-flow
    Description: S3 key prefix under the artifact bucket for this Flow application.
  AppName:
    Type: String
    Default: wpsuite-flow
    Description: Application name prefix used when naming Flow resources.
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment used in generated resource names.
  FrontendApiAuthMode:
    Type: String
    Default: NONE
    AllowedValues: [NONE, IAM]
    Description: Authentication mode for public frontend submission endpoints.
  AdminApiAuthMode:
    Type: String
    Default: COGNITO
    AllowedValues: [NONE, IAM, COGNITO]
    Description: Authentication mode for admin management endpoints.
  AdminCognitoUserPoolId:
    Type: String
    Default: ""
    Description: Cognito user pool ID for admin authentication when AdminApiAuthMode is COGNITO.
  AdminCognitoAuthScopes:
    Type: CommaDelimitedList
    Default: ""
    Description: Optional OAuth scopes required on admin endpoints when Cognito auth is enabled.
  EnableRecaptcha:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable Google reCAPTCHA validation for public form submissions.
  RecaptchaMode:
    Type: String
    Default: classic
    AllowedValues: [classic, enterprise]
    Description: Which reCAPTCHA product to use when reCAPTCHA protection is enabled.
  RecaptchaProjectId:
    Type: String
    Default: ""
    Description: Google Cloud project ID for reCAPTCHA Enterprise.
  RecaptchaSiteKey:
    Type: String
    Default: ""
    Description: Public reCAPTCHA site key expected from the frontend.
  RecaptchaSecretKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Secret reCAPTCHA key stored in SSM Parameter Store when provided.
  RecaptchaScoreThreshold:
    Type: Number
    Default: 0.5
    Description: Minimum accepted reCAPTCHA score from 0.0 to 1.0.
  EnableWAF:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable AWS WAF protection for the Flow API.
  PublicAllowedIPs:
    Type: CommaDelimitedList
    Default: ""
    Description: Optional CIDR allowlist for public submission endpoints.
  AdminAllowedIPs:
    Type: CommaDelimitedList
    Default: ""
    Description: Optional CIDR allowlist for admin endpoints.
  BlockedIPs:
    Type: CommaDelimitedList
    Default: ""
    Description: Optional CIDR ranges to block for all API traffic.
  EnableKmsForSecrets:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Create a dedicated KMS key for encrypting SSM-stored secrets.
  EnableGuardDutyMalwareProtection:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable GuardDuty Malware Protection for the payload bucket.
  DataRetentionDays:
    Type: Number
    Default: 30
    Description: Number of days to retain submission data before TTL cleanup.
  LogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues:
      [
        1,
        3,
        5,
        7,
        14,
        30,
        60,
        90,
        120,
        150,
        180,
        365,
        400,
        545,
        731,
        1827,
        3653,
      ]
    Description: Number of days to retain CloudWatch logs for Flow resources.
  LambdaMemorySize:
    Type: Number
    Default: 1024
    Description: Memory size in MB allocated to Flow Lambda functions.
  LambdaTimeout:
    Type: Number
    Default: 30
    Description: Maximum execution time in seconds for Flow Lambda functions.
  LogLevel:
    Type: String
    Default: INFO
    AllowedValues: [DEBUG, INFO, WARN, ERROR]
    Description: Application log level used by Flow Lambda functions.
  TemplatesBucketName:
    Type: String
    Default: ""
    Description: Existing S3 bucket for email templates. Leave empty to create one.
  PayloadBucketName:
    Type: String
    Default: ""
    Description: Existing S3 bucket for uploaded files. Leave empty to create one.
  TemplatesPrefix:
    Type: String
    Default: templates/
    Description: S3 prefix used to store and resolve email template files.
  FromEmail:
    Type: String
    Default: ""
    Description: SES-verified email address used as the sender for outbound email actions.
  DefaultWebhookSigningSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: Optional default HMAC secret used to sign webhook payloads.
  ApiCustomDomainName:
    Type: String
    Default: ""
    Description: Custom domain name for the API (optional, e.g. forms.example.com)
    AllowedPattern: ^$|^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$
    ConstraintDescription: Must be a valid domain name or empty.
  AcmCertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN for the custom domain (required when ApiCustomDomainName is set)
    AllowedPattern: ^$|^arn:aws(-[a-z0-9-]+)?:acm:[a-z0-9-]+:[0-9]{12}:certificate/[a-f0-9-]+$
    ConstraintDescription: Must be a valid ACM certificate ARN or empty.
  EnableRoute53:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Enable automatic Route53 alias record creation for the custom domain
  Route53HostedZoneId:
    Type: String
    Default: ""
    Description: Route53 hosted zone ID (optional, auto-discovered when empty)
    AllowedPattern: ^$|^[A-Z0-9]{10,32}$
    ConstraintDescription: Must be a valid hosted zone ID or empty.

Conditions:
  UseCustomDomain: !Not [!Equals [!Ref ApiCustomDomainName, ""]]
  UseRoute53: !And
    - !Condition UseCustomDomain
    - !Equals [!Ref EnableRoute53, "true"]
  UseProvidedHostedZoneId: !And
    - !Condition UseRoute53
    - !Not [!Equals [!Ref Route53HostedZoneId, ""]]
  EnableRecaptchaProtection: !Equals [!Ref EnableRecaptcha, "true"]
  WAFEnabled: !Equals [!Ref EnableWAF, "true"]
  HasPublicAllowedIPs:
    !And [
      !Condition WAFEnabled,
      !Not [!Equals [!Join ["", !Ref PublicAllowedIPs], ""]],
    ]
  HasAdminAllowedIPs:
    !And [
      !Condition WAFEnabled,
      !Not [!Equals [!Join ["", !Ref AdminAllowedIPs], ""]],
    ]
  HasBlockedIPs:
    !And [
      !Condition WAFEnabled,
      !Not [!Equals [!Join ["", !Ref BlockedIPs], ""]],
    ]
  UseAdminCognito:
    !And [
      !Equals [!Ref AdminApiAuthMode, "COGNITO"],
      !Not [!Equals [!Ref AdminCognitoUserPoolId, ""]],
    ]
  UseProvidedTemplatesBucket: !Not [!Equals [!Ref TemplatesBucketName, ""]]
  CreateTemplatesBucket: !Equals [!Ref TemplatesBucketName, ""]
  UseProvidedPayloadBucket: !Not [!Equals [!Ref PayloadBucketName, ""]]
  CreatePayloadBucket: !Equals [!Ref PayloadBucketName, ""]
  CreateKmsKey: !Equals [!Ref EnableKmsForSecrets, "true"]
  GuardDutyMalwareProtectionEnabled:
    !Equals [!Ref EnableGuardDutyMalwareProtection, "true"]
  HasDefaultWebhookSigningSecret:
    !Not [!Equals [!Ref DefaultWebhookSigningSecret, ""]]

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures: [arm64]
    MemorySize: !Ref LambdaMemorySize
    Timeout: !Ref LambdaTimeout
    Tracing: Active
    Environment:
      Variables:
        APP_NAME: !Ref AppName
        ENVIRONMENT: !Ref Environment
        EVENT_BUS_NAME: default
        SUBMISSIONS_TABLE: !Ref SubmissionsTable
        SUBMISSION_EVENTS_TABLE: !Ref SubmissionEventsTable
        TEMPLATES_TABLE: !Ref TemplatesTable
        WORKFLOW_DEFINITIONS_TABLE: !Ref WorkflowDefinitionsTable
        FORM_DEFINITIONS_TABLE: !Ref FormDefinitionsTable
        WEBHOOK_ENDPOINTS_TABLE: !Ref WebhookEndpointsTable
        ENABLE_RECAPTCHA: !Ref EnableRecaptcha
        RECAPTCHA_MODE: !Ref RecaptchaMode
        RECAPTCHA_PROJECT_ID: !Ref RecaptchaProjectId
        RECAPTCHA_SITE_KEY: !Ref RecaptchaSiteKey
        RECAPTCHA_SCORE_THRESHOLD: !Ref RecaptchaScoreThreshold
        TEMPLATES_BUCKET:
          !If [
            UseProvidedTemplatesBucket,
            !Ref TemplatesBucketName,
            !Ref TemplatesBucket,
          ]
        PAYLOAD_BUCKET:
          !If [
            UseProvidedPayloadBucket,
            !Ref PayloadBucketName,
            !Ref PayloadBucket,
          ]
        TEMPLATES_PREFIX: !Ref TemplatesPrefix
        FROM_EMAIL: !Ref FromEmail
        LOG_LEVEL: !Ref LogLevel
        DATA_RETENTION_DAYS: !Ref DataRetentionDays

Resources:
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${AppName}-${Environment}-api"
      Description: !Sub "${AppName}-${Environment} WP Suite Flow API"
      EndpointConfiguration:
        Types: [REGIONAL]

  ApiDomainName:
    Type: AWS::ApiGateway::DomainName
    Condition: UseCustomDomain
    Properties:
      DomainName: !Ref ApiCustomDomainName
      RegionalCertificateArn: !Ref AcmCertificateArn
      EndpointConfiguration:
        Types: [REGIONAL]
      SecurityPolicy: TLS_1_2

  AdminAuthorizer:
    Type: Custom::ApiAuthorizer
    Condition: UseAdminCognito
    Properties:
      ServiceToken: !GetAtt CustomResourceManagerFunction.Arn
      Name: !Sub "${AppName}-${Environment}-admin-cognito-authorizer"
      RestApiId: !Ref RestApi
      Type: COGNITO_USER_POOLS
      IdentitySource: method.request.header.Authorization
      ProviderARNs:
        - !Sub "arn:${AWS::Partition}:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${AdminCognitoUserPoolId}"

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AppName}-${Environment}-dlq"
      MessageRetentionPeriod: 1209600

  TemplatesBucket:
    Type: AWS::S3::Bucket
    Condition: CreateTemplatesBucket
    Properties:
      BucketName: !Sub "${AppName}-${Environment}-templates-${AWS::AccountId}"
      VersioningConfiguration: { Status: Enabled }

  PayloadBucket:
    Type: AWS::S3::Bucket
    Condition: CreatePayloadBucket
    Properties:
      BucketName: !Sub "${AppName}-${Environment}-payloads-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ["*"]
            AllowedMethods: [PUT, GET, HEAD]
            AllowedHeaders: ["*"]
            ExposedHeaders: [ETag]
            MaxAge: 3600
      VersioningConfiguration: { Status: Enabled }

  TemplatesBucketCleaner:
    Type: Custom::BucketCleaner
    Condition: CreateTemplatesBucket
    Properties:
      ServiceToken: !GetAtt CustomResourceManagerFunction.Arn
      BucketName: !Ref TemplatesBucket

  PayloadBucketCleaner:
    Type: Custom::BucketCleaner
    Condition: CreatePayloadBucket
    Properties:
      ServiceToken: !GetAtt CustomResourceManagerFunction.Arn
      BucketName: !Ref PayloadBucket

  GuardDutyMalwareProtectionRole:
    Type: AWS::IAM::Role
    Condition: GuardDutyMalwareProtectionEnabled
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: malware-protection-plan.guardduty.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: guardduty-malware-protection-payload-bucket
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ManagedRuleLifecycle
                Effect: Allow
                Action:
                  - events:PutRule
                  - events:DeleteRule
                  - events:PutTargets
                  - events:RemoveTargets
                Resource:
                  - !Sub "arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:rule/DO-NOT-DELETE-AmazonGuardDutyMalwareProtectionS3*"
                Condition:
                  StringLike:
                    events:ManagedBy: malware-protection-plan.guardduty.amazonaws.com
              - Sid: ManagedRuleRead
                Effect: Allow
                Action:
                  - events:DescribeRule
                  - events:ListTargetsByRule
                Resource:
                  - !Sub "arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:rule/DO-NOT-DELETE-AmazonGuardDutyMalwareProtectionS3*"
              - Sid: BucketMetadata
                Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:GetBucketNotification
                  - s3:PutBucketNotification
                  - s3:ListBucket
                Resource:
                  - !If
                    - UseProvidedPayloadBucket
                    - !Sub "arn:${AWS::Partition}:s3:::${PayloadBucketName}"
                    - !GetAtt PayloadBucket.Arn
              - Sid: ObjectReadAndTag
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:GetObjectTagging
                  - s3:GetObjectVersionTagging
                  - s3:PutObjectTagging
                  - s3:PutObjectVersionTagging
                Resource:
                  - !If
                    - UseProvidedPayloadBucket
                    - !Sub "arn:${AWS::Partition}:s3:::${PayloadBucketName}/*"
                    - !Sub "${PayloadBucket.Arn}/*"
              - Sid: PutValidationObject
                Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - !If
                    - UseProvidedPayloadBucket
                    - !Sub "arn:${AWS::Partition}:s3:::${PayloadBucketName}/malware-protection-resource-validation-object"
                    - !Sub "${PayloadBucket.Arn}/malware-protection-resource-validation-object"
              - Sid: AllowDecryptForMalwareScan
                Effect: Allow
                Action:
                  - kms:GenerateDataKey
                  - kms:Decrypt
                  - kms:DescribeKey
                Resource:
                  - !Sub "arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*"
                Condition:
                  StringLike:
                    kms:ViaService: !Sub "s3.${AWS::Region}.${AWS::URLSuffix}"

  GuardDutyMalwareProtectionPlan:
    Type: Custom::GuardDutyMalwareProtectionPlan
    Condition: GuardDutyMalwareProtectionEnabled
    Properties:
      ServiceToken: !GetAtt CustomResourceManagerFunction.Arn
      Role: !GetAtt GuardDutyMalwareProtectionRole.Arn
      ProtectedResource:
        S3Bucket:
          BucketName: !If
            - UseProvidedPayloadBucket
            - !Ref PayloadBucketName
            - !Ref PayloadBucket
      Actions:
        Tagging:
          Status: ENABLED
      Tags:
        - Key: Application
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

  SecretsKmsKey:
    Type: AWS::KMS::Key
    Condition: CreateKmsKey
    Properties:
      Description: !Sub "${AppName}-${Environment} secrets key"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableRootPermissions
            Effect: Allow
            Principal:
              { AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root" }
            Action: "kms:*"
            Resource: "*"
          - Sid: AllowSsmUse
            Effect: Allow
            Principal: { Service: ssm.amazonaws.com }
            Action:
              [kms:Decrypt, kms:Encrypt, kms:GenerateDataKey, kms:DescribeKey]
            Resource: "*"

  SecretsKmsAlias:
    Type: AWS::KMS::Alias
    Condition: CreateKmsKey
    Properties:
      AliasName: !Sub "alias/${AppName}-${Environment}-secrets"
      TargetKeyId: !Ref SecretsKmsKey

  SubmissionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AppName}-${Environment}-submissions"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
        - { AttributeName: GSI1PK, AttributeType: S }
        - { AttributeName: GSI1SK, AttributeType: S }
        - { AttributeName: GSI2PK, AttributeType: S }
        - { AttributeName: GSI2SK, AttributeType: S }
        - { AttributeName: GSI3PK, AttributeType: S }
        - { AttributeName: GSI3SK, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - { AttributeName: GSI1PK, KeyType: HASH }
            - { AttributeName: GSI1SK, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: GSI2
          KeySchema:
            - { AttributeName: GSI2PK, KeyType: HASH }
            - { AttributeName: GSI2SK, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: GSI3
          KeySchema:
            - { AttributeName: GSI3PK, KeyType: HASH }
            - { AttributeName: GSI3SK, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  SubmissionEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AppName}-${Environment}-submission-events"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }

  TemplatesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AppName}-${Environment}-templates"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
        - { AttributeName: GSI1PK, AttributeType: S }
        - { AttributeName: GSI1SK, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - { AttributeName: GSI1PK, KeyType: HASH }
            - { AttributeName: GSI1SK, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  WorkflowDefinitionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AppName}-${Environment}-workflow-definitions"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
        - { AttributeName: GSI1PK, AttributeType: S }
        - { AttributeName: GSI1SK, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - { AttributeName: GSI1PK, KeyType: HASH }
            - { AttributeName: GSI1SK, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  FormDefinitionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AppName}-${Environment}-form-definitions"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
        - { AttributeName: GSI1PK, AttributeType: S }
        - { AttributeName: GSI1SK, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - { AttributeName: GSI1PK, KeyType: HASH }
            - { AttributeName: GSI1SK, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  WebhookEndpointsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AppName}-${Environment}-webhook-endpoints"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
        - { AttributeName: GSI1PK, AttributeType: S }
        - { AttributeName: GSI1SK, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - { AttributeName: GSI1PK, KeyType: HASH }
            - { AttributeName: GSI1SK, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  CustomResourceManagerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AppName}-${Environment}-custom-resource-manager"
      RetentionInDays: !Ref LogRetentionDays

  CustomResourceManagerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AppName}-${Environment}-custom-resource-manager"
      CodeUri:
        Bucket: !Ref ArtifactBucketName
        Key: !Sub ${ArtifactKeyPrefix}/${DeploymentVersion}/functions/custom-resource.zip
      Handler: index.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - route53:ListHostedZonesByName
                - ssm:PutParameter
                - ssm:DeleteParameter
                - ssm:GetParameter
                - s3:ListBucket
                - s3:ListBucketVersions
                - s3:ListBucketMultipartUploads
                - s3:DeleteObject
                - s3:DeleteObjectVersion
                - s3:AbortMultipartUpload
                - wafv2:AssociateWebACL
                - wafv2:DisassociateWebACL
                - wafv2:CreateIPSet
                - wafv2:GetIPSet
                - wafv2:UpdateIPSet
                - wafv2:DeleteIPSet
                - wafv2:CreateWebACL
                - wafv2:GetWebACL
                - wafv2:UpdateWebACL
                - wafv2:DeleteWebACL
                - wafv2:TagResource
                - wafv2:UntagResource
                - guardduty:CreateMalwareProtectionPlan
                - guardduty:UpdateMalwareProtectionPlan
                - guardduty:GetMalwareProtectionPlan
                - guardduty:DeleteMalwareProtectionPlan
                - guardduty:TagResource
                - guardduty:UntagResource
                - iam:PassRole
                - apigateway:*
              Resource: "*"
        - !If
          - CreateKmsKey
          - Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                  - kms:Encrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt SecretsKmsKey.Arn
          - !Ref AWS::NoValue

  RecaptchaSecretParameter:
    Type: Custom::SSMParameter
    Condition: EnableRecaptchaProtection
    Properties:
      ServiceToken: !GetAtt CustomResourceManagerFunction.Arn
      Name: !Sub "/${AppName}/${Environment}/recaptcha/secret"
      Value: !Ref RecaptchaSecretKey
      KeyId: !If [CreateKmsKey, !Ref SecretsKmsKey, !Ref "AWS::NoValue"]

  DefaultWebhookSigningSecretParameter:
    Type: Custom::SSMParameter
    Condition: HasDefaultWebhookSigningSecret
    Properties:
      ServiceToken: !GetAtt CustomResourceManagerFunction.Arn
      Name: !Sub "/${AppName}/${Environment}/webhook/default-signing-secret"
      Value: !Ref DefaultWebhookSigningSecret
      KeyId: !If [CreateKmsKey, !Ref SecretsKmsKey, !Ref "AWS::NoValue"]

  PublicAllowedIpSet:
    Type: Custom::WafIPSet
    Condition: HasPublicAllowedIPs
    Properties:
      ServiceToken: !GetAtt CustomResourceManagerFunction.Arn
      Name: !Sub "${AppName}-${Environment}-public-allow"
      Scope: REGIONAL
      IPAddressVersion: IPV4
      Addresses: !Join [",", !Ref PublicAllowedIPs]

  AdminAllowedIpSet:
    Type: Custom::WafIPSet
    Condition: HasAdminAllowedIPs
    Properties:
      ServiceToken: !GetAtt CustomResourceManagerFunction.Arn
      Name: !Sub "${AppName}-${Environment}-admin-allow"
      Scope: REGIONAL
      IPAddressVersion: IPV4
      Addresses: !Join [",", !Ref AdminAllowedIPs]

  BlockedIpSet:
    Type: Custom::WafIPSet
    Condition: HasBlockedIPs
    Properties:
      ServiceToken: !GetAtt CustomResourceManagerFunction.Arn
      Name: !Sub "${AppName}-${Environment}-blocked"
      Scope: REGIONAL
      IPAddressVersion: IPV4
      Addresses: !Join [",", !Ref BlockedIPs]

  WebAcl:
    Type: Custom::WafWebACL
    Condition: WAFEnabled
    Properties:
      ServiceToken: !GetAtt CustomResourceManagerFunction.Arn
      Name: !Sub "${AppName}-${Environment}-webacl"
      Description: "WAF protection for WP Suite Flow API"
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${AppName}-${Environment}-webacl"
      Rules:
        - !If
          - HasBlockedIPs
          - Name: BlockedIPs
            Priority: 1
            Action:
              Block: {}
            Statement:
              IPSetReferenceStatement:
                ARN: !GetAtt BlockedIpSet.Arn
            VisibilityConfig:
              SampledRequestsEnabled: true
              CloudWatchMetricsEnabled: true
              MetricName: blocked-ips
          - !Ref AWS::NoValue
        - !If
          - HasPublicAllowedIPs
          - Name: PublicAllowList
            Priority: 2
            Action:
              Allow: {}
            Statement:
              IPSetReferenceStatement:
                ARN: !GetAtt PublicAllowedIpSet.Arn
            VisibilityConfig:
              SampledRequestsEnabled: true
              CloudWatchMetricsEnabled: true
              MetricName: public-allow
          - !Ref AWS::NoValue
        - !If
          - HasAdminAllowedIPs
          - Name: AdminAllowList
            Priority: 3
            Action:
              Allow: {}
            Statement:
              IPSetReferenceStatement:
                ARN: !GetAtt AdminAllowedIpSet.Arn
            VisibilityConfig:
              SampledRequestsEnabled: true
              CloudWatchMetricsEnabled: true
              MetricName: admin-allow
          - !Ref AWS::NoValue
        - Name: AwsManagedCommon
          Priority: 10
          OverrideAction:
            Count: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: aws-common
        - Name: RateLimit
          Priority: 20
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 1000
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: rate-limit

  WebAclAssociation:
    Type: Custom::WafAssociation
    Condition: WAFEnabled
    Properties:
      ServiceToken: !GetAtt CustomResourceManagerFunction.Arn
      WebACLArn: !GetAtt WebAcl.Arn
      ResourceArn: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}::/restapis/${RestApi}/stages/prod"

  FormsApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AppName}-${Environment}-forms-api"
      RetentionInDays: !Ref LogRetentionDays

  FormsApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AppName}-${Environment}-forms-api"
      CodeUri:
        Bucket: !Ref ArtifactBucketName
        Key: !Sub ${ArtifactKeyPrefix}/${DeploymentVersion}/functions/forms-api.zip
      Handler: index.handler
      DeadLetterQueue: { Type: SQS, TargetArn: !GetAtt DeadLetterQueue.Arn }
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref SubmissionsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref SubmissionEventsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref TemplatesTable }
        - DynamoDBCrudPolicy: { TableName: !Ref WorkflowDefinitionsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref FormDefinitionsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref WebhookEndpointsTable }
        - S3CrudPolicy:
            {
              BucketName:
                !If [
                  UseProvidedTemplatesBucket,
                  !Ref TemplatesBucketName,
                  !Ref TemplatesBucket,
                ],
            }
        - S3CrudPolicy:
            {
              BucketName:
                !If [
                  UseProvidedPayloadBucket,
                  !Ref PayloadBucketName,
                  !Ref PayloadBucket,
                ],
            }
        - Statement:
            - Effect: Allow
              Action: [events:PutEvents, ssm:GetParameter]
              Resource: "*"
        - !If
          - CreateKmsKey
          - Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                  - kms:Encrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt SecretsKmsKey.Arn
          - !Ref AWS::NoValue
      Environment:
        Variables:
          RECAPTCHA_SECRET_PARAMETER_NAME:
            !If [EnableRecaptchaProtection, !Ref RecaptchaSecretParameter, ""]
          DEFAULT_WEBHOOK_SIGNING_SECRET_PARAMETER_NAME:
            !If [
              HasDefaultWebhookSigningSecret,
              !Ref DefaultWebhookSigningSecretParameter,
              "",
            ]

  FormsApiInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FormsApiFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*/*"

  ApiRoutes:
    Type: Custom::ApiRoutes
    DependsOn:
      - FormsApiInvokePermission
    Properties:
      ServiceToken: !GetAtt CustomResourceManagerFunction.Arn
      RestApiId: !Ref RestApi
      StageName: prod
      FormsApiIntegrationUri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FormsApiFunction.Arn}/invocations"
      FrontendAuthMode: !Ref FrontendApiAuthMode
      AdminAuthMode: !Ref AdminApiAuthMode
      AdminAuthorizerId: !If [UseAdminCognito, !Ref AdminAuthorizer, ""]
      AdminAuthorizationScopes: !Join [",", !Ref AdminCognitoAuthScopes]

  ApiBasePathMapping:
    Type: Custom::ApiBasePathMapping
    Condition: UseCustomDomain
    DependsOn:
      - ApiRoutes
    Properties:
      ServiceToken: !GetAtt CustomResourceManagerFunction.Arn
      DomainName: !Ref ApiDomainName
      RestApiId: !Ref RestApi
      Stage: prod
      BasePath: ""

  HostedZoneLookup:
    Type: Custom::HostedZoneLookup
    Condition: UseRoute53
    Properties:
      ServiceToken: !GetAtt CustomResourceManagerFunction.Arn
      DomainName: !Ref ApiCustomDomainName

  DnsRecordA:
    Type: AWS::Route53::RecordSet
    Condition: UseRoute53
    DependsOn:
      - ApiBasePathMapping
    Properties:
      HostedZoneId: !If
        - UseProvidedHostedZoneId
        - !Ref Route53HostedZoneId
        - !GetAtt HostedZoneLookup.HostedZoneId
      Name: !Ref ApiCustomDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiDomainName.RegionalDomainName
        HostedZoneId: !GetAtt ApiDomainName.RegionalHostedZoneId

  DnsRecordAAAA:
    Type: AWS::Route53::RecordSet
    Condition: UseRoute53
    DependsOn:
      - ApiBasePathMapping
    Properties:
      HostedZoneId: !If
        - UseProvidedHostedZoneId
        - !Ref Route53HostedZoneId
        - !GetAtt HostedZoneLookup.HostedZoneId
      Name: !Ref ApiCustomDomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt ApiDomainName.RegionalDomainName
        HostedZoneId: !GetAtt ApiDomainName.RegionalHostedZoneId

  WorkflowDispatcherLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AppName}-${Environment}-workflow-dispatcher"
      RetentionInDays: !Ref LogRetentionDays

  WorkflowDispatcherFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AppName}-${Environment}-workflow-dispatcher"
      CodeUri:
        Bucket: !Ref ArtifactBucketName
        Key: !Sub ${ArtifactKeyPrefix}/${DeploymentVersion}/functions/workflow-dispatcher.zip
      Handler: index.handler
      DeadLetterQueue: { Type: SQS, TargetArn: !GetAtt DeadLetterQueue.Arn }
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref SubmissionsTable }
        - DynamoDBReadPolicy: { TableName: !Ref WorkflowDefinitionsTable }
        - DynamoDBReadPolicy: { TableName: !Ref FormDefinitionsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref SubmissionEventsTable }
        - DynamoDBReadPolicy: { TableName: !Ref WebhookEndpointsTable }
        - Statement:
            - Effect: Allow
              Action: [events:PutEvents]
              Resource: "*"
      Events:
        SubmissionEvents:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source: [wpsuite.forms, wpsuite.ai-kit]
              detail-type:
                [
                  submission.created,
                  submission.updated,
                  submission.status-changed,
                  submission.action-invoked,
                  ai.agent.completed,
                  ai.agent.failed,
                ]

  EmailSenderLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AppName}-${Environment}-email-sender"
      RetentionInDays: !Ref LogRetentionDays

  EmailSenderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AppName}-${Environment}-email-sender"
      CodeUri:
        Bucket: !Ref ArtifactBucketName
        Key: !Sub ${ArtifactKeyPrefix}/${DeploymentVersion}/functions/email-sender.zip
      Handler: index.handler
      DeadLetterQueue: { Type: SQS, TargetArn: !GetAtt DeadLetterQueue.Arn }
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref TemplatesTable }
        - DynamoDBCrudPolicy: { TableName: !Ref SubmissionEventsTable }
        - S3ReadPolicy:
            {
              BucketName:
                !If [
                  UseProvidedTemplatesBucket,
                  !Ref TemplatesBucketName,
                  !Ref TemplatesBucket,
                ],
            }
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, events:PutEvents]
              Resource: "*"
      Events:
        EmailRequested:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source: [wpsuite.forms]
              detail-type: [email.requested]

  WebhookDispatcherLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AppName}-${Environment}-webhook-dispatcher"
      RetentionInDays: !Ref LogRetentionDays

  WebhookDispatcherFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AppName}-${Environment}-webhook-dispatcher"
      CodeUri:
        Bucket: !Ref ArtifactBucketName
        Key: !Sub ${ArtifactKeyPrefix}/${DeploymentVersion}/functions/webhook-dispatcher.zip
      Handler: index.handler
      DeadLetterQueue: { Type: SQS, TargetArn: !GetAtt DeadLetterQueue.Arn }
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref SubmissionEventsTable }
        - DynamoDBReadPolicy: { TableName: !Ref WebhookEndpointsTable }
        - Statement:
            - Effect: Allow
              Action: [ssm:GetParameter, events:PutEvents]
              Resource: "*"
        - !If
          - CreateKmsKey
          - Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                  - kms:Encrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt SecretsKmsKey.Arn
          - !Ref AWS::NoValue
      Events:
        WebhookRequested:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source: [wpsuite.forms]
              detail-type: [integration.webhook.requested]
      Environment:
        Variables:
          DEFAULT_WEBHOOK_SIGNING_SECRET_PARAMETER_NAME:
            !If [
              HasDefaultWebhookSigningSecret,
              !Ref DefaultWebhookSigningSecretParameter,
              "",
            ]

Outputs:
  ApiUrl:
    Value: !If
      - UseCustomDomain
      - !Sub "https://${ApiCustomDomainName}"
      - !Sub "https://${RestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/prod"
  TemplatesBucketOutput:
    Value:
      !If [
        UseProvidedTemplatesBucket,
        !Ref TemplatesBucketName,
        !Ref TemplatesBucket,
      ]
  PayloadBucketOutput:
    Value:
      !If [UseProvidedPayloadBucket, !Ref PayloadBucketName, !Ref PayloadBucket]
  RecaptchaSecretParameterName:
    Condition: EnableRecaptchaProtection
    Value: !Ref RecaptchaSecretParameter
  CustomDomainUrl:
    Condition: UseCustomDomain
    Value: !Sub "https://${ApiCustomDomainName}"
  RegionalDomainName:
    Condition: UseCustomDomain
    Value: !GetAtt ApiDomainName.RegionalDomainName
  RegionalHostedZoneId:
    Condition: UseCustomDomain
    Value: !GetAtt ApiDomainName.RegionalHostedZoneId
