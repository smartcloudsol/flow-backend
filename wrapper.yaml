AWSTemplateFormatVersion: "2010-09-09"
Description: "WP Suite Workflows Backend - CloudFormation wrapper for the published nested backend stack"

Conditions:
  UseCustomDomain: !Not [!Equals [!Ref ApiCustomDomainName, ""]]

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Deployment Basics"
        Parameters:
          - AppName
          - Environment

      - Label:
          default: "Authentication & Access Control"
        Parameters:
          - FrontendApiAuthMode
          - AdminApiAuthMode
          - AdminCognitoUserPoolId
          - AdminCognitoAuthScopes

      - Label:
          default: "Security & Protection"
        Parameters:
          - EnableRecaptcha
          - RecaptchaMode
          - RecaptchaSecretKey
          - RecaptchaProjectId
          - RecaptchaSiteKey
          - RecaptchaScoreThreshold
          - EnableWAF
          - PublicAllowedIPs
          - AdminAllowedIPs
          - BlockedIPs
          - EnableKmsForSecrets
          - EnableGuardDutyMalwareProtection
          - ApiCustomDomainName
          - AcmCertificateArn
          - EnableRoute53
          - Route53HostedZoneId

      - Label:
          default: "Storage Configuration"
        Parameters:
          - TemplatesBucketName
          - PayloadBucketName
          - TemplatesPrefix

      - Label:
          default: "Email & Webhooks"
        Parameters:
          - FromEmail
          - DefaultWebhookSigningSecret

      - Label:
          default: "Data Retention & Performance"
        Parameters:
          - DataRetentionDays
          - LogRetentionDays
          - LambdaMemorySize
          - LambdaTimeout
          - LogLevel

    ParameterLabels:
      # Deployment Basics
      AppName:
        default: "Application Name"
      Environment:
        default: "Environment"

      # Authentication
      FrontendApiAuthMode:
        default: "Frontend API Authentication Mode"
      AdminApiAuthMode:
        default: "Admin API Authentication Mode"
      AdminCognitoUserPoolId:
        default: "Admin Cognito User Pool ID"
      AdminCognitoAuthScopes:
        default: "Admin Permissions (Scopes)"

      # Security
      EnableRecaptcha:
        default: "Enable reCAPTCHA Protection"
      RecaptchaMode:
        default: "reCAPTCHA Type"
      RecaptchaSecretKey:
        default: "reCAPTCHA Secret Key"
      RecaptchaProjectId:
        default: "reCAPTCHA Project ID (Enterprise)"
      RecaptchaSiteKey:
        default: "reCAPTCHA Site Key (Enterprise)"
      RecaptchaScoreThreshold:
        default: "Security Threshold"
      EnableWAF:
        default: "Enable Firewall (WAF)"
      PublicAllowedIPs:
        default: "Allowed IPs for Public Endpoints"
      AdminAllowedIPs:
        default: "Allowed IPs for Admin Endpoints"
      BlockedIPs:
        default: "Blocked IPs"
      EnableKmsForSecrets:
        default: "Enable KMS Encryption for Secrets"
      EnableGuardDutyMalwareProtection:
        default: "Enable GuardDuty Malware Protection for Uploads"
      ApiCustomDomainName:
        default: "API Custom Domain Name"
      AcmCertificateArn:
        default: "ACM Certificate ARN"
      EnableRoute53:
        default: "Auto-configure Route53 DNS"
      Route53HostedZoneId:
        default: "Route53 Hosted Zone ID"

      # Storage
      TemplatesBucketName:
        default: "Email Templates S3 Bucket (optional)"
      PayloadBucketName:
        default: "File Uploads S3 Bucket (optional)"
      TemplatesPrefix:
        default: "Templates Prefix"

      # Email & Webhooks
      FromEmail:
        default: "From Email Address"
      DefaultWebhookSigningSecret:
        default: "Default Webhook Signing Secret"

      # Data Retention & Performance
      DataRetentionDays:
        default: "Data Retention (days)"
      LogRetentionDays:
        default: "Log Retention (days)"
      LambdaMemorySize:
        default: "Lambda Memory Size (MB)"
      LambdaTimeout:
        default: "Lambda Timeout (seconds)"
      LogLevel:
        default: "Logging Level"

Parameters:
  DeploymentVersion:
    Type: String
    Default: 1.0.0
    Description: "Application version used to locate the published nested backend template in S3"

  ArtifactBucketName:
    Type: String
    Default: wpsuite-artifacts
    Description: "S3 bucket that stores the published deployment artifacts for this application"

  ArtifactKeyPrefix:
    Type: String
    Default: wpsuite-flow
    Description: "S3 key prefix under the artifact bucket for this Flow application"

  # ---- pass-through parameters for the backend app ----

  # Core Application Settings
  AppName:
    Type: String
    Default: wpsworkflows
    Description: "Application name for resource naming (alphanumeric and hyphens only)"

  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: "Deployment environment"

  # Authentication Configuration
  FrontendApiAuthMode:
    Type: String
    Default: NONE
    AllowedValues: [NONE, IAM]
    Description: "Authentication mode for frontend endpoints (form submissions)"

  AdminApiAuthMode:
    Type: String
    Default: COGNITO
    AllowedValues: [NONE, IAM, COGNITO]
    Description: "Authentication mode for admin endpoints"

  AdminCognitoUserPoolId:
    Type: String
    Default: ""
    Description: "Cognito User Pool ID for admin authentication (required if AdminApiAuthMode=COGNITO)"

  AdminCognitoAuthScopes:
    Type: CommaDelimitedList
    Default: ""
    Description: "Comma-separated OAuth scopes for admin endpoints (e.g., email,openid,profile)"

  # reCAPTCHA Configuration
  EnableRecaptcha:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: "Enable Google reCAPTCHA protection for frontend form submissions"

  RecaptchaMode:
    Type: String
    Default: classic
    AllowedValues: [classic, enterprise]
    Description: "reCAPTCHA version: Classic (v2/v3) or Enterprise"

  RecaptchaSecretKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: "reCAPTCHA secret key from Google (encrypted in SSM Parameter Store)"

  RecaptchaProjectId:
    Type: String
    Default: ""
    Description: "Google Cloud project ID for reCAPTCHA Enterprise"

  RecaptchaSiteKey:
    Type: String
    Default: ""
    Description: "reCAPTCHA site key for Enterprise mode"

  RecaptchaScoreThreshold:
    Type: Number
    Default: 0.5
    MinValue: 0
    MaxValue: 1
    Description: "Minimum reCAPTCHA score threshold (0.0-1.0, higher = more strict)"

  # WAF Configuration
  EnableWAF:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: "Enable AWS WAF protection for API endpoints"

  PublicAllowedIPs:
    Type: CommaDelimitedList
    Default: ""
    Description: "CIDR ranges allowed for frontend endpoints (e.g., 1.2.3.0/24). Empty = allow all."

  AdminAllowedIPs:
    Type: CommaDelimitedList
    Default: ""
    Description: "CIDR ranges allowed for admin endpoints (e.g., 10.0.0.0/8). Empty = allow all."

  BlockedIPs:
    Type: CommaDelimitedList
    Default: ""
    Description: "CIDR ranges to block for all endpoints (e.g., 192.168.1.0/24)"

  EnableKmsForSecrets:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: "Create a dedicated KMS key for encrypting secrets in SSM Parameter Store"

  EnableGuardDutyMalwareProtection:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: "Enable Amazon GuardDuty Malware Protection for the payload bucket. GuardDuty must already be enabled in the target account and region."

  ApiCustomDomainName:
    Type: String
    Default: ""
    Description: "Custom domain name for the API (optional, e.g. forms.example.com)"

  AcmCertificateArn:
    Type: String
    Default: ""
    Description: "ACM certificate ARN for the custom domain (required if ApiCustomDomainName is set)"

  EnableRoute53:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: "Enable automatic Route53 DNS configuration for custom domain"

  Route53HostedZoneId:
    Type: String
    Default: ""
    Description: "Route53 hosted zone ID (optional, will be auto-discovered if empty)"

  # Storage Configuration
  TemplatesBucketName:
    Type: String
    Default: ""
    Description: "Existing S3 bucket name for email templates. Leave empty to create a new bucket."

  PayloadBucketName:
    Type: String
    Default: ""
    Description: "Existing S3 bucket name for file uploads. Leave empty to create a new bucket."

  TemplatesPrefix:
    Type: String
    Default: templates/
    Description: "S3 prefix for organizing email template files"

  # Email Configuration
  FromEmail:
    Type: String
    Default: ""
    Description: "Email address for sending notifications (must be verified in AWS SES)"

  DefaultWebhookSigningSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Optional HMAC secret for signing webhook payloads"

  # Data Retention
  DataRetentionDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 365
    Description: "Days to keep submission data in DynamoDB before automatic deletion"

  LogRetentionDays:
    Type: Number
    Default: 14
    MinValue: 1
    MaxValue: 365
    Description: "Days to keep CloudWatch logs"

  # Performance Configuration
  LambdaMemorySize:
    Type: Number
    Default: 1024
    MinValue: 128
    MaxValue: 10240
    Description: "Memory allocated to Lambda functions (MB)"

  LambdaTimeout:
    Type: Number
    Default: 30
    MinValue: 3
    MaxValue: 900
    Description: "Maximum execution time for Lambda functions (seconds)"

  LogLevel:
    Type: String
    Default: INFO
    AllowedValues: [DEBUG, INFO, WARN, ERROR]
    Description: "Logging level for Lambda functions (DEBUG for detailed logs, INFO for normal operation)"

Resources:
  FlowBackend:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${ArtifactBucketName}.s3.${AWS::Region}.amazonaws.com/${ArtifactKeyPrefix}/${DeploymentVersion}/template.yaml
      Parameters:
        # Core Application Settings
        AppName: !Ref AppName
        Environment: !Ref Environment

        # Authentication Configuration
        FrontendApiAuthMode: !Ref FrontendApiAuthMode
        AdminApiAuthMode: !Ref AdminApiAuthMode
        AdminCognitoUserPoolId: !Ref AdminCognitoUserPoolId
        AdminCognitoAuthScopes: !Join [",", !Ref AdminCognitoAuthScopes]

        # reCAPTCHA Configuration
        EnableRecaptcha: !Ref EnableRecaptcha
        RecaptchaMode: !Ref RecaptchaMode
        RecaptchaSecretKey: !Ref RecaptchaSecretKey
        RecaptchaProjectId: !Ref RecaptchaProjectId
        RecaptchaSiteKey: !Ref RecaptchaSiteKey
        RecaptchaScoreThreshold: !Ref RecaptchaScoreThreshold

        # WAF Configuration
        EnableWAF: !Ref EnableWAF
        PublicAllowedIPs: !Join [",", !Ref PublicAllowedIPs]
        AdminAllowedIPs: !Join [",", !Ref AdminAllowedIPs]
        BlockedIPs: !Join [",", !Ref BlockedIPs]

        # Security
        EnableKmsForSecrets: !Ref EnableKmsForSecrets
        EnableGuardDutyMalwareProtection: !Ref EnableGuardDutyMalwareProtection
        ApiCustomDomainName: !Ref ApiCustomDomainName
        AcmCertificateArn: !Ref AcmCertificateArn
        EnableRoute53: !Ref EnableRoute53
        Route53HostedZoneId: !Ref Route53HostedZoneId

        # Storage Configuration
        TemplatesBucketName: !Ref TemplatesBucketName
        PayloadBucketName: !Ref PayloadBucketName
        TemplatesPrefix: !Ref TemplatesPrefix

        # Email Configuration
        FromEmail: !Ref FromEmail
        DefaultWebhookSigningSecret: !Ref DefaultWebhookSigningSecret

        # Data Retention
        DataRetentionDays: !Ref DataRetentionDays
        LogRetentionDays: !Ref LogRetentionDays

        # Performance Configuration
        LambdaMemorySize: !Ref LambdaMemorySize
        LambdaTimeout: !Ref LambdaTimeout
        LogLevel: !Ref LogLevel

Outputs:
  ApiUrl:
    Description: "Base URL for the Workflows API"
    Value: !GetAtt FlowBackend.Outputs.ApiUrl

  TemplatesBucketOutput:
    Description: "S3 bucket for email templates"
    Value: !GetAtt FlowBackend.Outputs.TemplatesBucketOutput

  PayloadBucketOutput:
    Description: "S3 bucket for file uploads"
    Value: !GetAtt FlowBackend.Outputs.PayloadBucketOutput

  CustomDomainUrl:
    Condition: UseCustomDomain
    Description: "Custom domain URL when configured"
    Value: !GetAtt FlowBackend.Outputs.CustomDomainUrl

  RegionalDomainName:
    Condition: UseCustomDomain
    Description: "Regional API Gateway domain name when custom domain is configured"
    Value: !GetAtt FlowBackend.Outputs.RegionalDomainName

  RegionalHostedZoneId:
    Condition: UseCustomDomain
    Description: "Regional API Gateway hosted zone ID when custom domain is configured"
    Value: !GetAtt FlowBackend.Outputs.RegionalHostedZoneId
